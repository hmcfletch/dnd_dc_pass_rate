<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D DC Pass Rate</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --accent-dim: #c73e54;
      --text: #eaeaea;
      --muted: #a0a0a0;
      --border: #2a2a4a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 1.5rem 0;
      color: var(--text);
    }
    .layout {
      display: grid;
      gap: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (min-width: 700px) {
      .layout { grid-template-columns: 280px 1fr; }
    }
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    section h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 1rem 0;
    }
    .field {
      margin-bottom: 1rem;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 0.5rem 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.95rem;
    }
    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .dc-table {
      width: 100%;
      border-collapse: collapse;
    }
    .dc-table th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .dc-table td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    .dc-table tr:last-child td { border-bottom: none; }
    .dc-table .dc { width: 4rem; }
    .dc-table .pct {
      color: var(--accent);
      font-weight: 500;
    }
    .dc-table .pct.high { color: #4ade80; }
    .dc-table .pct.mid { color: #facc15; }
    .dc-table .pct.low { color: #f87171; }
  </style>
</head>
<body>
  <div class="layout">
    <section class="inputs">
      <h2>Roll parameters</h2>
      <div class="field">
        <label for="statMod">Stat modifier</label>
        <input type="number" id="statMod" value="0" />
      </div>
      <div class="field">
        <label for="profBonus">Proficiency bonus</label>
        <input type="number" id="profBonus" value="2" />
      </div>
      <div class="field">
        <label for="profType">Proficiency</label>
        <select id="profType">
          <option value="none">None</option>
          <option value="proficiency">Proficiency</option>
          <option value="expertise">Expertise</option>
        </select>
      </div>
      <div class="field">
        <label for="rollType">Roll type</label>
        <select id="rollType">
          <option value="straight">Straight d20</option>
          <option value="advantage">Advantage</option>
          <option value="disadvantage">Disadvantage</option>
        </select>
      </div>
      <div class="field">
        <label for="flatMod">Other flat modifiers</label>
        <input type="number" id="flatMod" value="0" />
      </div>
      <h2 style="margin-top: 1.25rem;">Additional dice</h2>
      <div class="field">
        <label for="d4">d4</label>
        <input type="number" id="d4" value="0" min="0" />
      </div>
      <div class="field">
        <label for="d6">d6</label>
        <input type="number" id="d6" value="0" min="0" />
      </div>
      <div class="field">
        <label for="d8">d8</label>
        <input type="number" id="d8" value="0" min="0" />
      </div>
      <div class="field">
        <label for="d10">d10</label>
        <input type="number" id="d10" value="0" min="0" />
      </div>
      <div class="field">
        <label for="d12">d12</label>
        <input type="number" id="d12" value="0" min="0" />
      </div>
    </section>
    <section class="results">
      <h2>Chance to meet or beat DC</h2>
      <table class="dc-table">
        <thead>
          <tr>
            <th class="dc">DC</th>
            <th class="pct">Pass %</th>
          </tr>
        </thead>
        <tbody id="dcBody"></tbody>
      </table>
    </section>
  </div>
  <script>
    (function () {
      const DEBOUNCE_MS = 300;

      function getD20Distribution(rollType) {
        const p = new Array(21).fill(0);
        if (rollType === 'straight') {
          for (let k = 1; k <= 20; k++) p[k] = 1 / 20;
        } else if (rollType === 'advantage') {
          for (let k = 1; k <= 20; k++) p[k] = (2 * k - 1) / 400;
        } else {
          for (let k = 1; k <= 20; k++) p[k] = (41 - 2 * k) / 400;
        }
        return p;
      }

      function dieDistribution(sides) {
        const d = new Array(sides + 1).fill(0);
        for (let i = 1; i <= sides; i++) d[i] = 1 / sides;
        return d;
      }

      function convolve(a, b) {
        const n = a.length;
        const m = b.length;
        const out = new Array(n + m - 1).fill(0);
        for (let i = 0; i < n; i++) {
          if (a[i] === 0) continue;
          for (let j = 0; j < m; j++) {
            if (b[j] === 0) continue;
            out[i + j] += a[i] * b[j];
          }
        }
        return out;
      }

      function getExtraDiceDistribution(counts) {
        let dist = [1];
        const dice = [
          [4, counts.d4],
          [6, counts.d6],
          [8, counts.d8],
          [10, counts.d10],
          [12, counts.d12],
        ];
        for (const [sides, count] of dice) {
          const one = dieDistribution(sides);
          for (let c = 0; c < count; c++) {
            dist = convolve(dist, one);
          }
        }
        return dist;
      }

      function getTotalDistribution(d20Dist, extraDist) {
        return convolve(d20Dist, extraDist);
      }

      function probabilityAtLeast(totalDist, minValue) {
        let sum = 0;
        for (let i = Math.max(0, minValue); i < totalDist.length; i++) {
          sum += totalDist[i];
        }
        return sum;
      }

      function getModifier(state) {
        let mod = (state.statMod | 0) + (state.flatMod | 0);
        const prof = state.profBonus | 0;
        if (state.profType === 'proficiency') mod += prof;
        else if (state.profType === 'expertise') mod += 2 * prof;
        return mod;
      }

      const PARAM_SPEC = [
        { key: 'statMod', id: 'statMod', default: 0, type: 'number' },
        { key: 'profBonus', id: 'profBonus', default: 2, type: 'number' },
        { key: 'profType', id: 'profType', default: 'none', type: 'string' },
        { key: 'rollType', id: 'rollType', default: 'straight', type: 'string' },
        { key: 'flatMod', id: 'flatMod', default: 0, type: 'number' },
        { key: 'd4', id: 'd4', default: 0, type: 'number' },
        { key: 'd6', id: 'd6', default: 0, type: 'number' },
        { key: 'd8', id: 'd8', default: 0, type: 'number' },
        { key: 'd10', id: 'd10', default: 0, type: 'number' },
        { key: 'd12', id: 'd12', default: 0, type: 'number' },
      ];

      const PROF_TYPE_VALUES = ['none', 'proficiency', 'expertise'];
      const ROLL_TYPE_VALUES = ['straight', 'advantage', 'disadvantage'];

      function applyParamsFromUrl() {
        const params = new URLSearchParams(window.location.search);
        PARAM_SPEC.forEach(function (spec) {
          const raw = params.get(spec.key);
          if (raw === null) return;
          const el = document.getElementById(spec.id);
          if (!el) return;
          if (spec.type === 'number') {
            const n = parseInt(raw, 10);
            if (!isNaN(n)) el.value = spec.key.startsWith('d') ? Math.max(0, n) : n;
          } else {
            if (spec.key === 'profType' && PROF_TYPE_VALUES.indexOf(raw) !== -1) el.value = raw;
            else if (spec.key === 'rollType' && ROLL_TYPE_VALUES.indexOf(raw) !== -1) el.value = raw;
          }
        });
      }

      function stateToParamsForUrl(state) {
        const o = {};
        PARAM_SPEC.forEach(function (spec) {
          const v = state[spec.key];
          const def = spec.default;
          if (v === undefined) return;
          if (spec.type === 'number' ? Number(v) !== Number(def) : String(v) !== String(def)) {
            o[spec.key] = String(v);
          }
        });
        return o;
      }

      function updateUrlFromState() {
        const state = getState();
        const params = stateToParamsForUrl(state);
        const q = Object.keys(params).length ? '?' + new URLSearchParams(params).toString() : '';
        const url = window.location.pathname + q + window.location.hash;
        window.history.replaceState(null, '', url);
      }

      function getState() {
        return {
          statMod: parseInt(document.getElementById('statMod').value, 10) || 0,
          profBonus: parseInt(document.getElementById('profBonus').value, 10) || 0,
          profType: document.getElementById('profType').value,
          rollType: document.getElementById('rollType').value,
          flatMod: parseInt(document.getElementById('flatMod').value, 10) || 0,
          d4: Math.max(0, parseInt(document.getElementById('d4').value, 10) || 0),
          d6: Math.max(0, parseInt(document.getElementById('d6').value, 10) || 0),
          d8: Math.max(0, parseInt(document.getElementById('d8').value, 10) || 0),
          d10: Math.max(0, parseInt(document.getElementById('d10').value, 10) || 0),
          d12: Math.max(0, parseInt(document.getElementById('d12').value, 10) || 0),
        };
      }

      function updateChances() {
        const state = getState();
        const mod = getModifier(state);
        const d20Dist = getD20Distribution(state.rollType);
        const extraDist = getExtraDiceDistribution(state);
        const totalDist = getTotalDistribution(d20Dist, extraDist);

        const tbody = document.getElementById('dcBody');
        tbody.innerHTML = '';
        for (let dc = 1; dc <= 30; dc++) {
          const effectiveMin = dc - mod;
          const p = probabilityAtLeast(totalDist, effectiveMin);
          const pct = (100 * p).toFixed(1);
          const tr = document.createElement('tr');
          const pctClass = p >= 0.75 ? 'high' : p >= 0.5 ? 'mid' : 'low';
          tr.innerHTML = '<td class="dc">' + dc + '</td><td class="pct ' + pctClass + '">' + pct + '%</td>';
          tbody.appendChild(tr);
        }
        updateUrlFromState();
      }

      function debounce(fn, ms) {
        let t;
        return function () {
          clearTimeout(t);
          t = setTimeout(fn, ms);
        };
      }

      const debouncedUpdate = debounce(updateChances, DEBOUNCE_MS);

      const inputs = document.querySelectorAll('.inputs input, .inputs select');
      inputs.forEach(function (el) {
        el.addEventListener('input', debouncedUpdate);
        el.addEventListener('change', debouncedUpdate);
      });

      applyParamsFromUrl();
      updateChances();
    })();
  </script>
</body>
</html>
